<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <script>
        window.onload = iniciar;

        let expressao = '';

        function limparTela() {
            expressao = '';

            let campoExpressao = document.getElementById('expressaoTexto');
            campoExpressao.innerHTML = '';

            let campoResultado = document.getElementById('resultado');
            campoResultado.innerHTML = '';
        }

        function adicionarNaExpressao(event) {
            let valorClicado = event.target.textContent;
            expressao = expressao + valorClicado;

            let campoExpressao = document.getElementById('expressaoTexto');
            campoExpressao.innerHTML = expressao;
        }

        function calcularResultado() {
            let campoResultado = document.getElementById('resultado');
            let resultadoFinal = eval(expressao);

            campoResultado.innerHTML = resultadoFinal;
        }

        function iniciar() {
            let numZero = document.getElementById("zero");
            numZero.addEventListener('click', adicionarNaExpressao);

            let numNove = document.getElementById("nove");
            numNove.addEventListener('click', adicionarNaExpressao);

            let numOito = document.getElementById("oito");
            numOito.addEventListener('click', adicionarNaExpressao);

            let numSete = document.getElementById("sete");
            numSete.addEventListener('click', adicionarNaExpressao);

            let numSeis = document.getElementById("seis");
            numSeis.addEventListener('click', adicionarNaExpressao);

            let numCinco = document.getElementById("cinco");
            numCinco.addEventListener('click', adicionarNaExpressao);

            let numQuatro = document.getElementById("quatro");
            numQuatro.addEventListener('click', adicionarNaExpressao);

            let numTres = document.getElementById("tres");
            numTres.addEventListener('click', adicionarNaExpressao);

            let numDois = document.getElementById("dois");
            numDois.addEventListener('click', adicionarNaExpressao);

            let numUm = document.getElementById("um");
            numUm.addEventListener('click', adicionarNaExpressao);

            // operadores matematicos
            let operadorMultiplicacao = document.getElementById('multiplicacao');
            operadorMultiplicacao.addEventListener('click', adicionarNaExpressao);

            let operadorDivisao = document.getElementById('divisao');
            operadorDivisao.addEventListener('click', adicionarNaExpressao);

            let operadorSubtracao = document.getElementById('subtracao');
            operadorSubtracao.addEventListener('click', adicionarNaExpressao);

            let operadorSoma = document.getElementById('adicao');
            operadorSoma.addEventListener('click', adicionarNaExpressao);

            // botões principais por último
            let botaoLimpar = document.getElementById('clear');
            botaoLimpar.addEventListener('click', limparTela);

            let botaoIgual = document.getElementById('igual');
            botaoIgual.addEventListener('click', calcularResultado);
        }
    </script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            border: 1px solid #000;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            cursor: pointer;
        }

        #expressaoTexto,
        #resultado {
            grid-column: span 4;
            border: 1px solid #000;
            height: 40px;
            text-align: right;
            padding: 5px;
        }

        button:hover {
            background-color: #ddd;
        }
    </style>
</head>

<body>
    <div class="calculadora">
        <p id="expressaoTexto"></p>
        <p id="resultado"></p>

        <button id="um">1</button>
        <button id="dois">2</button>
        <button id="tres">3</button>
        <button id="quatro">4</button>
        <button id="cinco">5</button>
        <button id="seis">6</button>
        <button id="sete">7</button>
        <button id="oito">8</button>
        <button id="nove">9</button>
        <button id="zero">0</button>

        <button id="adicao">+</button>
        <button id="subtracao">-</button>
        <button id="divisao">/</button>
        <button id="multiplicacao">*</button>
        <button id="clear">C</button>
        <button id="igual">=</button>
    </div>
</body>

</html>
